<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Merit Order — Wordmark Logo
  Variant: The Masthead (Broadsheet A)

  USAGE:
  Best rendered as inline SVG in your HTML <header> (custom fonts load fully).
  Fallback: Georgia / Times New Roman renders cleanly when Google Fonts is unavailable.

  For <img> tag use, load Google Fonts in your page <head> first:
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Libre+Franklin:wght@300&display=swap" rel="stylesheet">
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 155 56"
  width="155"
  height="56"
  role="img"
  aria-label="The Merit Order"
>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Libre+Franklin:wght@300&display=swap');
    ]]></style>
  </defs>

  <!-- THE -->
  <text
    x="1"
    y="13"
    font-family="'Libre Franklin', 'Arial Narrow', Arial, sans-serif"
    font-size="8"
    font-weight="300"
    letter-spacing="4.2"
    fill="#b02418"
  >THE</text>

  <!-- Merit Order -->
  <text
    x="0"
    y="40"
    font-family="'DM Serif Display', Georgia, 'Times New Roman', serif"
    font-size="24"
    fill="#1a1210"
    textLength="155"
    lengthAdjust="spacingAndGlyphs"
  >Merit Order</text>

  <!-- Double rule -->
  <rect x="0" y="46"   width="155" height="2.5" fill="#1a1210"/>
  <rect x="0" y="51.5" width="155" height="0.8"  fill="#1a1210"/>

</svg>
